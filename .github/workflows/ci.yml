name: End-to-end Test

on:
  push:
    branches: [ main ]
  workflow_dispatch: null

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.14]

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build tools and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine pytest pytest-cov

      - name: Install package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_LSSTDESC_DIFFSKY: "1.1.1"
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_GALSAMPLER: "0.1.1"
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_DIFFMAH: "0.7.3"
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_DIFFSTAR: "1.0.3"
        run: pip install .

      - name: Run GalSim
        run: |
          pushd roman_imsim_testdata
          galsim hack.yaml
          popd

      - name: Run unit tests
        run: |
          pytest --strict-markers tests/test_end_to_end.py

      # - name: Upload coverage report
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: coverage-report
      #     path: coverage.xml
